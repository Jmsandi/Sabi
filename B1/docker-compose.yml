services:
  postgres:
    image: postgres:16-alpine
    container_name: sabi-b1-postgres
    environment:
      POSTGRES_USER: sabi
      POSTGRES_PASSWORD: sabi
      POSTGRES_DB: sabi_documents
    ports:
      - '5432:5432'
    volumes:
      - sabi_b1_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sabi -d sabi_documents']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sabi_b1_pgdata:
